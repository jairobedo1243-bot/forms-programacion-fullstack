<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Solicitud de Servicio - SGRSI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="contenedor">
    <h2>Solicitud de Servicio Técnico</h2>

    <form action="#" method="post">

        <!-- Nombre -->
        <label for="nombre">Nombre del solicitante:</label>
        <input type="text" id="nombre" name="nombre" required>

        <!-- Email -->
        <label for="email">Correo electrónico:</label>
        <input type="email" id="email" name="email" required>

        <!-- Tipo de servicio -->
        <label for="tipo">Tipo de servicio:</label>
        <select id="tipo" name="tipo" required>
            <option value="">Seleccione una opción</option>
            <option value="instalacion">Instalación</option>
            <option value="mantenimiento">Mantenimiento</option>
            <option value="configuracion">Configuración</option>
            <option value="laboratorio">Preparación de laboratorio</option>
        </select>

        <!-- Fecha -->
        <label for="fecha">Fecha solicitada:</label>
        <input type="date" id="fecha" name="fecha" required>

        <!-- Descripción -->
        <label for="descripcion">Descripción del pedido:</label>
        <textarea id="descripcion" name="descripcion" required></textarea>

        <!-- Urgente -->
        <div class="grupo">
            <input type="checkbox" id="urgente" name="urgente">
            <label for="urgente">Marcar si es urgente</label>
        </div>

        <!-- Botón -->
        <button type="submit">Enviar solicitud</button>

    </form>
</div>

</body>
</html>
